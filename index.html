<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/svg+xml" href="%BASE_URL%favicon.svg" />
    <link rel="apple-touch-icon" href="%BASE_URL%apple-touch-icon.png" />
    <meta name="theme-color" content="#1B2A4A" />
    <title>MD Web Design</title>
    <script>
      // Enable scroll-reveal only when JS is on and motion is allowed. The
      // prerendered HTML has no this class, so crawlers and reduced-motion
      // users always see content immediately (no hidden-by-default content).
      try {
        if (!window.matchMedia("(prefers-reduced-motion: reduce)").matches) {
          document.documentElement.classList.add("js-reveal");
        }
      } catch (e) {}
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
